<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Result</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5 text-center">
    <div class="alert alert-success">
        <h2 class="display-4">Congratulations!</h2>
        <p class="lead">You have completed the exam for {{ course.name }}.</p>
    </div>
    <div class="card p-4 shadow-sm">
        <h3>Your Final Score: <span class="badge badge-primary">{{ score }}</span></h3>
    </div>
    <a href="{% url 'onlinecourse:course_details' course.id %}" class="btn btn-outline-secondary mt-4">Retake Exam</a>
</div>
</body>
</html>
