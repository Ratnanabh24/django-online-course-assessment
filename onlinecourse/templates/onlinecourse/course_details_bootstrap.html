<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ course.name }}</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>{{ course.name }}</h2>
    <form id="exam-form" action="{% url 'onlinecourse:submit' course.id %}" method="post">
        {% csrf_token %}
        {% for lesson in course.lesson_set.all %}
            <div class="card mt-3">
                <div class="card-header"><h5>{{ lesson.title }}</h5></div>
                <div class="card-body">
                    {% for question in lesson.question_set.all %}
                        <p class="font-weight-bold">{{ question.question_text }}</p>
                        {% for choice in question.choice_set.all %}
                            <div class="form-check">
                                <label class="form-check-label">
                                    <input type="checkbox" name="choice" class="form-check-input" value="{{ choice.id }}">
                                    {{ choice.choice_text }}
                                </label>
                            </div>
                        {% endfor %}
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
        <input class="btn btn-primary mt-4" type="submit" value="Submit">
    </form>
</div>
</body>
</html>
